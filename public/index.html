        async function sendMessage() {
            const input = document.getElementById('chatInput');
            let content = input.value.trim();
            
            if (!AppState.currentSession) return;
            if (!content && AppState.pendingFiles.length === 0) return;
            
            const sessionId = AppState.currentSession.id;
            
            // 清空输入
            input.value = '';
            input.style.height = '44px';
            
            // 禁用发送按钮
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            AppState.isStreaming = true;
            AppState.reasoningPartIds.clear(); // 清空reasoning追踪
            
            // 上传文件并收集路径
            const uploadedFiles = [];
            for (const pf of AppState.pendingFiles) {
                try {
                    const result = await uploadFile(pf.file);
                    if (result.success) {
                        uploadedFiles.push(result);
                        console.log('[上传] 文件上传成功:', result.file_name);
                    } else {
                        console.error('[上传] 文件上传失败:', result.error);
                    }
                } catch (e) {
                    console.error('[上传] 上传失败:', e);
                }
            }
            
            // 清空待上传列表
            AppState.pendingFiles = [];
            renderFilePreview();
            
            // 构建消息内容（包含文件路径）
            if (uploadedFiles.length > 0) {
                content += '\n\n[上传的文件]\n';
                uploadedFiles.forEach(f => {
                    content += `- ${f.file_name}: ${f.absolute_path}\n`;
                });
            }
            
            // 初始化state
            if (!AppState.messages[sessionId]) {
                AppState.messages[sessionId] = [];
            }
            if (!AppState.parts[sessionId]) {
                AppState.parts[sessionId] = {};
            }
            
            // 创建临时用户消息ID
            const tempUserMsgID = `temp_user_${Date.now()}`;
            
            // 添加用户消息到state
            AppState.messages[sessionId].push({
                id: tempUserMsgID,
                role: 'user',
                modelID: AppState.selectedModel,
                agent: AppState.selectedAgent,
                time: {created: Date.now()}
            });
            
            // 添加用户消息的part
            AppState.parts[sessionId][`part_${tempUserMsgID}`] = {
                id: `part_${tempUserMsgID}`,
                messageID: tempUserMsgID,
                type: 'text',
                text: content
            };
            
            // 更新session的last_message
            const session = AppState.sessions.find(s => (s.session_id || s.id) === sessionId);
            if (session) {
                session.last_message = content.substring(0, 30);
            }
            
            // 渲染消息（会自动显示"思考中..."）
            renderMessages();
            
            try {
                // 构建前缀（发送到API时添加，但网页不显示）
                const prefix = `[QQ用户 "${AppState.userQQ}" 发送了一个消息，请私聊回复, qq用户名称: "${AppState.userName || AppState.userQQ}" , 会话ID: "${sessionId}"]\n\n`;
                
                // 构建请求体，包含模型和智能体参数
                const requestBody = {
                    parts: [{type: 'text', text: prefix + content}]
                };
                
                // 解析模型参数 - OpenCode API需要 {modelID, providerID} 格式
                if (AppState.selectedModel) {
                    const modelParts = AppState.selectedModel.split('/');
                    if (modelParts.length >= 2) {
                        requestBody.model = {
                            modelID: modelParts.slice(1).join('/'),
                            providerID: modelParts[0]
                        };
                    } else {
                        requestBody.model = {
                            modelID: AppState.selectedModel,
                            providerID: ''
                        };
                    }
                }
                if (AppState.selectedAgent) {
                    requestBody.agent = AppState.selectedAgent;
                }
                
                console.log('[API] 发送消息到会话:', sessionId);
                const result = await apiPost(`/api/opencode/sessions/${sessionId}/messages`, requestBody);
                console.log('[API] 消息发送结果:', result);
                
                // 更新后端会话数据的 last_accessed 时间
                apiPost('/api/session/switch', { user_id: AppState.userQQ, session_id: sessionId }).catch(e => {
                    console.warn('[API] 更新会话时间失败:', e);
                });
                
                // 注意：不在这里设置 isStreaming = false，等待 message.updated 事件
            } catch (error) {
                console.error('发送消息失败:', error);
                sendBtn.disabled = false;
                AppState.isStreaming = false;
                
                // 添加错误消息
                if (!AppState.messages[sessionId]) {
                    AppState.messages[sessionId] = [];
                }
                if (!AppState.parts[sessionId]) {
                    AppState.parts[sessionId] = {};
                }
                
                // 创建错误消息
                const errorMsgID = `error_msg_${Date.now()}`;
                AppState.messages[sessionId].push({
                    id: errorMsgID,
                    role: 'assistant',
                    time: {created: Date.now()}
                });
                
                const errorPartID = `error_part_${Date.now()}`;
                AppState.parts[sessionId][errorPartID] = {
                    id: errorPartID,
                    messageID: errorMsgID,
                    type: 'text',
                    text: `发送失败: ${error.message}`
                };
                scheduleRender();
            }
        }

        // =====================================================
        // SSE 事件流
        // =====================================================
        function connectSSE() {
            if (AppState.eventSource) {
                AppState.eventSource.close();
            }
            
            // 通过URL参数传递token
            const token = getAuthToken();
            const sseUrl = token ? `/api/opencode/events?token=${encodeURIComponent(token)}` : '/api/opencode/events';
            
            AppState.eventSource = new EventSource(sseUrl);
            
            AppState.eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleSSEEvent(data);
                } catch (e) {
                    console.error('SSE 解析错误:', e);
                }
            };
            
            AppState.eventSource.onerror = (e) => {
                console.error('SSE 连接错误:', e);
                // 5秒后重连
                setTimeout(connectSSE, 5000);
            };
        }

        function handleSSEEvent(rawData) {
            // OpenCode SSE 格式: {directory, payload: {type, properties: {...}}}
            const type = rawData.payload?.type || rawData.type || rawData.event;
            const props = rawData.payload?.properties || rawData;
            
            // 检查是否是当前会话的事件
            // 注意：不同事件类型的sessionID位置不同
            let sessionId = props.sessionID || props.part?.sessionID || rawData.session_id;
            
            // 调试日志
            console.log('[SSE]', type, sessionId ? `(session: ${sessionId.substring(0,20)}...)` : '(no session)');
            
            // 使用当前会话ID（用于需要当前会话上下文的事件）
            const currentSessionId = AppState.currentSession?.id;
            
            switch (type) {
                case 'server.connected':
                    console.log('SSE 连接成功');
                    break;
                    
                case 'server.heartbeat':
                    // 心跳，忽略
                    break;
                    
                case 'message.part.delta':
                    // 流式文本增量 - 更新state
                    const deltaSessionId = props.sessionID;
                    const partID = props.partID;
                    const delta = props.delta || '';
                    const field = props.field || 'text';
                    const deltaMessageID = props.messageID;  // 获取messageID
                    
                    console.log('[SSE] delta:', delta?.substring(0,30), 'field:', field, 'session:', deltaSessionId?.substring(0,20));
                    
                    if (deltaSessionId && partID && field === 'text') {
                        // 初始化parts
                        if (!AppState.parts[deltaSessionId]) {
                            AppState.parts[deltaSessionId] = {};
                        }
                        
                        // 初始化messages
                        if (!AppState.messages[deltaSessionId]) {
                            AppState.messages[deltaSessionId] = [];
                        }
                        
                        // 如果有messageID，确保对应的AI消息存在
                        if (deltaMessageID) {
                            const existingMsg = AppState.messages[deltaSessionId].find(m => m.id === deltaMessageID);
                            if (!existingMsg) {
                                AppState.messages[deltaSessionId].push({
                                    id: deltaMessageID,
                                    role: 'assistant',
                                    sessionID: deltaSessionId,
                                    time: {created: Date.now()}
                                });
                            }
                            AppState.currentMessageID = deltaMessageID;
                        }
                        
                        // 获取或创建part - 不使用order字段，按照事件接收顺序
                        if (!AppState.parts[deltaSessionId][partID]) {
                            AppState.parts[deltaSessionId][partID] = { 
                                text: '', 
                                id: partID,
                                messageID: deltaMessageID  // 设置messageID
                            };
                        } else if (deltaMessageID && !AppState.parts[deltaSessionId][partID].messageID) {
                            // 如果已有part但没有messageID，补充设置
                            AppState.parts[deltaSessionId][partID].messageID = deltaMessageID;
                        }
                        
                        // 追加文本
                        const newText = (AppState.parts[deltaSessionId][partID].text || '') + delta;
                        AppState.parts[deltaSessionId][partID].text = newText;
                        
                        // 如果是当前会话，尝试增量更新
                        if (AppState.currentSession?.id === deltaSessionId) {
                            // 优先尝试增量更新DOM
                            const updated = updateStreamingText(deltaSessionId, partID, newText);
                            if (!updated) {
                                // 增量更新失败（元素不存在），使用节流渲染
                                scheduleRender();
                            }
                        }
                    }
                    break;
                    
                case 'message.part.updated':
                    // 消息部分更新（工具调用等）
                    const part = props.part || {};
                    const partSessionId = part.sessionID;
                    const partId = part.id;
                    const partMessageID = part.messageID || props.messageID;  // messageID可能在part或props中
                    
                    console.log('[SSE] part updated:', part.type, part.tool || '', 'session:', partSessionId?.substring(0,20), 'messageID:', partMessageID?.substring(0,15));
                    
                    if (partSessionId && partId) {
                        // 初始化parts
                        if (!AppState.parts[partSessionId]) {
                            AppState.parts[partSessionId] = {};
                        }
                        
                        // 初始化messages
                        if (!AppState.messages[partSessionId]) {
                            AppState.messages[partSessionId] = [];
                        }
                        
                        // 如果有messageID，确保对应的AI消息存在
                        if (partMessageID) {
                            const existingMsg = AppState.messages[partSessionId].find(m => m.id === partMessageID);
                            if (!existingMsg) {
                                AppState.messages[partSessionId].push({
                                    id: partMessageID,
                                    role: 'assistant',
                                    sessionID: partSessionId,
                                    time: {created: Date.now()}
                                });
                            }
                            AppState.currentMessageID = partMessageID;
                        }
                        
                        // 更新或创建part - 不使用order字段，按照事件接收顺序
                        AppState.parts[partSessionId][partId] = {
                            ...AppState.parts[partSessionId][partId],
                            ...part,
                            messageID: partMessageID || AppState.parts[partSessionId][partId]?.messageID  // 优先使用新的messageID
                        };
                        
                        // 如果是当前会话，节流渲染
                        if (AppState.currentSession?.id === partSessionId) {
                            scheduleRender();
                        }
                    }
                    break;
                    
case 'message.updated':
                    // 消息更新 - 从 props.info 获取消息信息
                    const info = props.info || {};
                    const msgSessionId = info.sessionID || AppState.currentSession?.id;  // 使用当前会话ID作为后备
                    const msgId = info.id;
                    const msgRole = info.role;
                    
                    console.log('[SSE] message.updated:', msgRole, 'id:', msgId?.substring(0,15), 'session:', msgSessionId?.substring(0,20), 'tokens:', info.tokens);
                    
                    if (msgSessionId && msgId) {
                        // 初始化messages
                        if (!AppState.messages[msgSessionId]) {
                            AppState.messages[msgSessionId] = [];
                        }
                        
                        // 检查是否已存在
                        const existing = AppState.messages[msgSessionId].find(m => m.id === msgId);
                        if (existing) {
                            // 更新现有消息
                            Object.assign(existing, info);
                        } else {
                            // 检查是否有同角色的临时消息需要替换
                            const tempMsg = AppState.messages[msgSessionId].find(
                                m => m.id.toString().startsWith('temp_') && m.role === msgRole
                            );
                            if (tempMsg) {
                                // 替换临时消息，保留parts引用
                                const idx = AppState.messages[msgSessionId].indexOf(tempMsg);
                                const oldId = tempMsg.id;
                                AppState.messages[msgSessionId][idx] = info;
                                
                                // 删除临时用户消息的parts（用户消息的parts应该由API返回）
                                if (msgRole === 'user' && AppState.parts[msgSessionId]) {
                                    // 删除所有临时用户消息的parts
                                    const tempPartPrefix = `part_${oldId}`;
                                    Object.keys(AppState.parts[msgSessionId]).forEach(partId => {
                                        if (partId.startsWith(tempPartPrefix) || AppState.parts[msgSessionId][partId].messageID === oldId) {
                                            delete AppState.parts[msgSessionId][partId];
                                            console.log('[SSE] 删除临时用户part:', partId);
                                        }
                                    });
                                }
                                
                                // 对于AI消息，更新临时parts的messageID
                                if (msgRole === 'assistant' && AppState.parts[msgSessionId]) {
                                    // 检查是否已经有新的parts（来自SSE事件）
                                    const newPartsExist = Object.values(AppState.parts[msgSessionId])
                                        .some(p => p.messageID === msgId && !p.id.toString().startsWith('part_temp_'));
                                    
                                    if (newPartsExist) {
                                        // 新parts已存在，删除旧的临时parts
                                        Object.keys(AppState.parts[msgSessionId]).forEach(partId => {
                                            if (AppState.parts[msgSessionId][partId].messageID === oldId) {
                                                delete AppState.parts[msgSessionId][partId];
                                                console.log('[SSE] 删除临时AI part:', partId);
                                            }
                                        });
                                    } else {
                                        // 没有新parts，更新临时parts的messageID
                                        Object.values(AppState.parts[msgSessionId]).forEach(part => {
                                            if (part.messageID === oldId) {
                                                part.messageID = msgId;
                                            }
                                        });
                                    }
                                }
                                console.log('[SSE] 替换临时消息:', msgRole, 'oldId:', oldId, 'newId:', msgId);
                            } else {
                                // 新增消息
                                AppState.messages[msgSessionId].push(info);
                            }
                        }
                        
                        // 更新currentMessageID
                        AppState.currentMessageID = msgId;
                        
                        // 更新session的last_message、tokens和时间
                        const session = AppState.sessions.find(s => (s.session_id || s.id) === msgSessionId);
                        if (session) {
                            // 从parts获取最后一条消息的文本
                            const parts = AppState.parts[msgSessionId] || {};
                            const lastMsgParts = Object.values(parts).filter(p => p.messageID === msgId && p.type === 'text');
                            if (lastMsgParts.length > 0) {
                                session.last_message = lastMsgParts.map(p => p.text || '').join('').substring(0, 30);
                            }
                            // 更新tokens（从info.tokens获取）
                            if (info.tokens) {
                                session.tokens = info.tokens;
                                console.log('[SSE] 更新tokens:', info.tokens);
                            } else {
                                console.log('[SSE] 没有tokens信息, info:', JSON.stringify(info).substring(0, 200));
                            }
                            // 更新会话时间
                            session.updated_at = info.time?.updated || info.time?.created || Date.now();
                            // 更新UI
                            const tokens = session.tokens || {total: 0, input: 0, output: 0};
                            document.getElementById('tokenCount').textContent = (tokens.total || 0).toLocaleString();
                            // 刷新会话列表显示最新时间
                            renderSessions();
                        }
                        
                        // 如果是当前会话，重新渲染（会自动更新会话列表预览）
                        if (AppState.currentSession?.id === msgSessionId) {
                            scheduleRender();
                        }
                        
                        // AI消息更新完成时，重置流式状态和发送按钮
                        if (msgRole === 'assistant') {
                            AppState.isStreaming = false;
                            document.getElementById('sendBtn').disabled = false;
                        }
                    }
                    break;
                    
                case 'session.status':
                    // 存储会话状态
                    const statusSessionId = props.sessionID;
                    const statusValue = props.status || 'idle';
                    if (statusSessionId) {
                        AppState.sessionStatus[statusSessionId] = statusValue;
                        // 如果是当前会话，可能需要更新UI
                        if (AppState.currentSession?.id === statusSessionId) {
                            renderMessages();
                        }
                    }
                    break;
                    
                case 'session.created':
                    // 新会话创建 - 只添加到列表，不重新获取所有
                    // loadSessions会处理这个
                    break;
                    
                case 'session.updated':
                    // 会话更新 - 只更新特定会话
                    const updatedSessionId = props.sessionID || props.id;
                    if (updatedSessionId) {
                        const session = AppState.sessions.find(s => (s.session_id || s.id) === updatedSessionId);
                        if (session && props.title) {
                            session.title = props.title;
                            session.updated_at = props.updated_at || Date.now();
                            renderSessions();
                        }
                    }
                    break;
                    
                case 'message_start':
                    // 消息开始 - 清理旧状态
                    break;
                    
                case 'done':
                case 'message_end':
                    // 消息结束
                    AppState.isStreaming = false;
                    document.getElementById('sendBtn').disabled = false;
                    break;
                    
                case 'error':
                    // 错误
                    AppState.isStreaming = false;
                    document.getElementById('sendBtn').disabled = false;
                    console.error('SSE错误:', props.message || rawData.message || rawData.error || '未知错误');
                    break;
                    
                default:
                    console.log('未处理的 SSE 事件:', type, rawData);
            }
        }

        // =====================================================
        // 配置选择
        // =====================================================
        
        // 从config.yaml获取的配置（硬编码，与config.yaml保持一致）
        const CONFIG_MODELS = [
            "opencode/big-pickle",
            "opencode/gpt-5-nano",
            "opencode/minimax-m2.5-free",
            "opencode/trinity-large-preview-free",
            "deepseek/deepseek-chat",
            "deepseek/deepseek-reasoner",
            "alibaba-coding-plan-cn/qwen3.5-plus",
            "alibaba-coding-plan-cn/qwen3-max-2026-01-23",
            "alibaba-coding-plan-cn/qwen3-coder-next",
            "alibaba-coding-plan-cn/qwen3-coder-plus",
            "alibaba-coding-plan-cn/glm-5",
            "alibaba-coding-plan-cn/glm-4.7",
            "alibaba-coding-plan-cn/kimi-k2.5",
            "alibaba-coding-plan-cn/minimax-m2.5"
        ];
        
        const CONFIG_AGENTS = [
            "Sisyphus (Ultraworker)",
            "Prometheus",
            "Atlas"
        ];
        
        const CONFIG_DEFAULT_MODEL = "alibaba-coding-plan-cn/glm-5";
        const CONFIG_DEFAULT_AGENT = "Sisyphus (Ultraworker)";
        
        async function loadModels() {
            try {
                // 使用config.yaml中的模型列表
                AppState.models = CONFIG_MODELS.map(id => {
                    const parts = id.split('/');
                    const modelId = parts.slice(1).join('/');
                    const provider = parts[0];
                    return {
                        id: id,
                        name: modelId || id,
                        provider: provider
                    };
                });
                console.log('加载模型列表:', AppState.models.length, '个');
                renderModelSelect();
            } catch (error) {
                console.error('加载模型列表失败:', error);
            }
        }
        
        async function loadAgents() {
            try {
                // 从插件 API 获取智能体列表（无需认证）
                const response = await fetch('/api/agents/list');
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success && Array.isArray(data.agents)) {
                        AppState.agents = data.agents.map(function(agent) {
                            // agent 可能是字符串或对象
                            if (typeof agent === 'string') {
                                return { id: agent, name: agent };
                            }
                            return {
                                id: agent.id || agent.name || agent,
                                name: agent.name || agent.id || agent
                            };
                        });
                        console.log('从API加载智能体列表:', AppState.agents.length, '个');
                    } else {
                        // 使用默认列表
                        AppState.agents = CONFIG_AGENTS.map(name => ({
                            id: name,
                            name: name
                        }));
                        console.log('使用默认智能体列表:', AppState.agents.length, '个');
                    }
                } else {
                    // 使用默认列表
                    AppState.agents = CONFIG_AGENTS.map(name => ({
                        id: name,
                        name: name
                    }));
                    console.log('API请求失败，使用默认智能体列表');
                }
                
                renderAgentSelect();
            } catch (error) {
                console.error('加载智能体列表失败:', error);
                // 使用默认列表
                AppState.agents = CONFIG_AGENTS.map(name => ({
                    id: name,
                    name: name
                }));
                renderAgentSelect();
            }
        }

        function renderModelSelect() {
            const container = document.getElementById('modelItems');
            const selected = document.querySelector('#modelSelect .select-selected');
            const selectedText = selected.querySelector('.select-selected-text');
            
            container.innerHTML = '';
            
            if (AppState.models.length === 0) {
                container.innerHTML = '<div style="padding:8px 12px;color:#999;">暂无可用模型</div>';
                return;
            }
            
            AppState.models.forEach(model => {
                const item = document.createElement('div');
                item.textContent = model.name || model.id || model;
                item.dataset.value = model.id || model;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();  // 阻止事件冒泡
                    selectedText.textContent = item.textContent;
                    selected.dataset.value = item.dataset.value;
                    AppState.selectedModel = item.dataset.value;
                    container.classList.remove('select-show');
                });
                container.appendChild(item);
            });
            
            // 默认选中配置中的默认值
            const defaultModel = AppState.models.find(m => m.id === CONFIG_DEFAULT_MODEL);
            if (defaultModel) {
                selectedText.textContent = defaultModel.name || defaultModel.id;
                selected.dataset.value = defaultModel.id;
                AppState.selectedModel = defaultModel.id;
            } else if (AppState.models.length > 0) {
                const first = AppState.models[0];
                selectedText.textContent = first.name || first.id || first;
                selected.dataset.value = first.id || first;
                AppState.selectedModel = first.id || first;
            }
        }

        function renderAgentSelect() {
            const container = document.getElementById('agentItems');
            const selected = document.querySelector('#agentSelect .select-selected');
            const selectedText = selected.querySelector('.select-selected-text');
            
            container.innerHTML = '';
            
            if (AppState.agents.length === 0) {
                container.innerHTML = '<div style="padding:8px 12px;color:#999;">暂无可用智能体</div>';
                return;
            }
            
            AppState.agents.forEach(agent => {
                const item = document.createElement('div');
                item.textContent = agent.name || agent.id || agent;
                item.dataset.value = agent.id || agent;
                item.addEventListener('click', (e) => {
                    e.stopPropagation();  // 阻止事件冒泡
                    selectedText.textContent = item.textContent;
                    selected.dataset.value = item.dataset.value;
                    AppState.selectedAgent = item.dataset.value;
                    container.classList.remove('select-show');
                });
                container.appendChild(item);
            });
            
            // 默认选中配置中的默认值
            const defaultAgent = AppState.agents.find(a => a.id === CONFIG_DEFAULT_AGENT);
            if (defaultAgent) {
                selectedText.textContent = defaultAgent.name || defaultAgent.id;
                selected.dataset.value = defaultAgent.id;
                AppState.selectedAgent = defaultAgent.id;
            } else if (AppState.agents.length > 0) {
                const first = AppState.agents[0];
                selectedText.textContent = first.name || first.id || first;
                selected.dataset.value = first.id || first;
                AppState.selectedAgent = first.id || first;
            }
        }

        // =====================================================
        // 工具函数
        // =====================================================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            // 处理数字时间戳：秒级(<1e12)需要乘以1000转换为毫秒
            let timestamp = isoString;
            if (typeof isoString === 'number') {
                timestamp = isoString < 1e12 ? isoString * 1000 : isoString;
            }
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
            
            return date.toLocaleDateString('zh-CN', {month: 'short', day: 'numeric'});
        }

        function formatMarkdown(text) {
            if (!text) return '';
            
            // 配置 marked.js
            if (typeof marked !== 'undefined') {
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (typeof hljs !== 'undefined' && lang && hljs.getLanguage(lang)) {
                            try {
                                return hljs.highlight(code, { language: lang }).value;
                            } catch (e) {}
                        }
                        if (typeof hljs !== 'undefined') {
                            try {
                                return hljs.highlightAuto(code).value;
                            } catch (e) {}
                        }
                        return code;
                    },
                    breaks: true,
                    gfm: true
                });
                
                // 解析并返回带包装的HTML
                return '<div class="markdown-content">' + marked.parse(text) + '</div>';
            }
            
            // 回退：简单格式化（如果库未加载）
            return '<div class="markdown-content">' + text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>') + '</div>';
        }

        // =====================================================
        // UI 交互
        // =====================================================
        function toggleTool(headerEl) {
            const card = headerEl.parentElement;
            card.classList.toggle('expanded');
        }

        // 自定义下拉框逻辑
        function initCustomSelects() {
            document.querySelectorAll('.custom-select').forEach(wrapper => {
                const selected = wrapper.querySelector('.select-selected');
                const itemsList = wrapper.querySelector('.select-items');

                selected.addEventListener('click', function(e) {
                    e.stopPropagation();
                    closeAllSelects(this);
                    itemsList.classList.toggle('select-show');
                });
            });
        }

        function closeAllSelects(except) {
            document.querySelectorAll('.select-items').forEach(items => {
                if (items.previousElementSibling !== except) {
                    items.classList.remove('select-show');
                }
            });
        }

        // Textarea 自适应高度
        function initTextarea() {
            const chatInput = document.getElementById('chatInput');
            
            chatInput.addEventListener('input', function() {
                this.style.height = '44px';
                if (this.scrollHeight > 150) {
                    this.style.height = '150px';
                    this.style.overflowY = 'auto';
                } else {
                    this.style.height = this.scrollHeight + 'px';
                    this.style.overflowY = 'hidden';
                }
            });

            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (this.value.trim() && !AppState.isStreaming) {
                        sendMessage();
                    }
                }
            });
        }

        // 发送按钮点击
        function initSendButton() {
            document.getElementById('sendBtn').addEventListener('click', () => {
                if (!AppState.isStreaming) {
                    sendMessage();
                }
            });
        }

        // 拖拽上传支持
        function initDragDrop() {
            const inputArea = document.querySelector('.input-area');
            
            inputArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                inputArea.classList.add('drag-over');
            });
            
            inputArea.addEventListener('dragleave', (e) => {
                inputArea.classList.remove('drag-over');
            });
            
            inputArea.addEventListener('drop', async (e) => {
                e.preventDefault();
                inputArea.classList.remove('drag-over');
                
                const files = e.dataTransfer.files;
                for (const file of files) {
                    await addPendingFile(file);
                }
            });
        }

        // 粘贴图片支持
        function initPasteImage() {
            document.addEventListener('paste', async (e) => {
                const items = e.clipboardData.items;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        const file = item.getAsFile();
                        await addPendingFile(file);
                    }
                }
            });
        }

        // =====================================================
        // 文件上传功能
        // =====================================================
        async function addPendingFile(file) {
            // 检查文件大小（50MB）
            if (file.size > 50 * 1024 * 1024) {
                alert('文件大小不能超过50MB');
                return;
            }
            
            // 生成预览
            let preview = '';
            if (file.type.startsWith('image/')) {
                preview = await readFileAsDataURL(file);
            } else {
                preview = '📄';  // 文件图标
            }
            
            // 添加到待上传列表
            AppState.pendingFiles.push({
                file: file,
                preview: preview,
                type: file.type,
                name: file.name,
                size: file.size
            });
            
            // 更新预览区域
            renderFilePreview();
        }

        function renderFilePreview() {
            const area = document.getElementById('filePreviewArea');
            
            if (AppState.pendingFiles.length === 0) {
                area.style.display = 'none';
                area.innerHTML = '';
                return;
            }
            
            area.style.display = 'flex';
            area.innerHTML = AppState.pendingFiles.map((f, i) => `
                <div class="file-preview-card">
                    ${f.type.startsWith('image/') ? 
                        `<img src="${f.preview}" alt="${escapeHtml(f.name)}">` : 
                        `<div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:24px;">${f.preview}</div>`
                    }
                    <div class="file-info">
                        <div class="file-name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</div>
                        <div class="file-size">${formatFileSize(f.size)}</div>
                    </div>
                    <button class="remove-btn" onclick="removePendingFile(${i})">x</button>
                </div>
            `).join('');
        }

        function removePendingFile(index) {
            AppState.pendingFiles.splice(index, 1);
            renderFilePreview();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('user_id', AppState.userQQ);
            
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            
            return await response.json();
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // =====================================================
        // 标题栏菜单功能
        // =====================================================
        function toggleMenu() {
            const dropdown = document.getElementById('menuDropdown');
            dropdown.classList.toggle('show');
        }

        function copySessionId() {
            const sessionId = AppState.currentSession?.id;
            if (sessionId) {
                navigator.clipboard.writeText(sessionId).then(() => {
                    alert('会话ID已复制: ' + sessionId);
                }).catch(err => {
                    console.error('复制失败:', err);
                });
            }
            toggleMenu(); // 关闭菜单
        }

        function openInOpenCodeWeb() {
            const sessionId = AppState.currentSession?.id;
            if (sessionId) {
                window.open(`http://127.0.0.1:4091/?session=${sessionId}`, '_blank');
            }
            toggleMenu(); // 关闭菜单
        }

        // 点击菜单按钮切换菜单
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.getElementById('menuBtn');
            if (menuBtn) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleMenu();
                });
            }
            
            // 点击其他地方关闭菜单
            document.addEventListener('click', () => {
                const dropdown = document.getElementById('menuDropdown');
                if (dropdown && dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            });
        });

        // =====================================================
        // 初始化
        // =====================================================
        
        // 切换侧边栏
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            const toggleBtn = document.getElementById('sidebarToggle');
            
            if (window.innerWidth <= 768) {
                // 移动端：切换 show 类
                sidebar.classList.toggle('show');
                if (overlay) {
                    overlay.classList.toggle('show');
                }
                const isShow = sidebar.classList.contains('show');
                toggleBtn.innerHTML = isShow ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
            } else {
                // 桌面端：切换 collapsed 类
                sidebar.classList.toggle('collapsed');
                const isCollapsed = sidebar.classList.contains('collapsed');
                toggleBtn.innerHTML = isCollapsed ? '<i class="fas fa-bars"></i>' : '<i class="fas fa-times"></i>';
            }
        }
        
        async function initApp() {
            // 加载配置
            await Promise.all([loadModels(), loadAgents()]);
            
            // 加载用户目录设置
            try {
                const result = await apiPost('/api/directory/get', { user_id: AppState.userQQ });
                if (result.success && result.directory) {
                    document.getElementById('workPath').value = result.directory;
                }
            } catch (e) {
                console.log('获取用户目录失败，使用默认值');
            }
            
            // 加载会话列表
            await loadSessions();
            
            // 恢复之前选中的会话
            const savedSessionId = localStorage.getItem('currentSessionId');
            if (savedSessionId && AppState.sessions.find(s => (s.session_id || s.id) === savedSessionId)) {
                await selectSession(savedSessionId);
            }
            
            // 连接 SSE
            connectSSE();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化机器人信息（头像、昵称）- 等待完成
            await initBotInfo();
            
            // 初始化 UI 交互
            initCustomSelects();
            initTextarea();
            initSendButton();
            initDragDrop();
            initPasteImage();
            
            // 监听消息流滚动，检测用户是否在底部
            const messageContent = document.getElementById('messageContent');
            messageContent.addEventListener('scroll', () => {
                const threshold = 100; // 距离底部100px内视为"在底部"
                const isAtBottom = messageContent.scrollHeight - messageContent.scrollTop - messageContent.clientHeight < threshold;
                AppState.userAtBottom = isAtBottom;
            });
            
            // 点击页面关闭下拉框
            document.addEventListener('click', closeAllSelects);
            
            // 侧边栏切换按钮
            document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
            
            // 遮罩层点击关闭侧边栏（移动端）
            const overlay = document.querySelector('.sidebar-overlay');
            if (overlay) {
                overlay.addEventListener('click', toggleSidebar);
            }
            
            // 检查登录状态
            const savedQQ = localStorage.getItem('userQQ');
            if (!savedQQ) {
                document.getElementById('loginModal').style.display = 'flex';
                return;
            }
            
            AppState.userQQ = savedQQ;
            AppState.userName = savedQQ; // 默认使用QQ号作为用户名称
            updateUserName(savedQQ);
            
            // 初始化应用
            await initApp();
        });
    </script>
