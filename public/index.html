        // =====================================================
        // 会话管理
        // =====================================================
        async function loadSessions() {
            try {
                const userQQ = AppState.userQQ;
                
                // 统一使用用户会话列表API
                const result = await apiPost('/api/session/list', { user_id: userQQ });
                
                if (result && Array.isArray(result.sessions)) {
                    AppState.sessions = result.sessions.map(s => ({
                        id: s.session_id || s.id,
                        session_id: s.session_id || s.id,
                        title: s.title || '未命名会话',
                        created_at: s.created_at || Date.now() / 1000,
                        last_accessed: s.last_accessed || s.updated_at || Date.now() / 1000,
                        directory: s.directory
                    }));
                }
                
                if (!AppState.sessions) {
                    AppState.sessions = [];
                }
                
                // 为每个会话获取最后一条消息预览
                await Promise.all(AppState.sessions.slice(0, 20).map(async session => {
                    const sessionId = session.session_id;
                    try {
                        const messages = await apiGet(`/api/opencode/sessions/${sessionId}/messages?limit=1`);
                        if (messages && messages.length > 0) {
                            const lastMsg = messages[messages.length - 1];
                            let preview = '';
                            if (lastMsg.parts && lastMsg.parts.length > 0) {
                                const textParts = lastMsg.parts.filter(p => p.type === 'text');
                                preview = textParts.map(p => p.text || '').join('').substring(0, 50);
                            }
                            if (!preview && lastMsg.info?.role) {
                                preview = lastMsg.info.role === 'user' ? '用户消息' : 'AI回复';
                            }
                            preview = preview.replace(/^\[QQ用户[^}\]]*\}\s*/, '').substring(0, 30);
                            session.last_message = preview || '暂无消息';
                        } else {
                            session.last_message = '暂无消息';
                        }
                    } catch (e) {
                        session.last_message = '暂无消息';
                    }
                }));
                
                renderSessions();
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        function renderSessions() {
            const container = document.getElementById('sessionList');
            container.innerHTML = '';
            
            if (AppState.sessions.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px; color: var(--text-sub); font-size: 13px;">
                        暂无会话<br>点击下方按钮新建
                    </div>
                `;
                return;
            }
            
            // 按时间降序排序（最新的在前面）
            const sortedSessions = [...AppState.sessions].sort((a, b) => {
                const timeA = a.last_accessed || a.updated_at || a.time?.updated || 0;
                const timeB = b.last_accessed || b.updated_at || b.time?.updated || 0;
                // 处理秒级时间戳
                const tsA = typeof timeA === 'number' ? (timeA < 1e12 ? timeA * 1000 : timeA) : new Date(timeA).getTime();
                const tsB = typeof timeB === 'number' ? (timeB < 1e12 ? timeB * 1000 : timeB) : new Date(timeB).getTime();
                return tsB - tsA; // 降序
            });
            
            sortedSessions.forEach(session => {
                const sessionId = session.session_id || session.id;
                const item = document.createElement('div');
                item.className = 'session-item' + (AppState.currentSession?.id === sessionId ? ' active' : '');
                item.dataset.sessionId = sessionId;
                
                const time = session.last_accessed || session.updated_at || session.time?.updated ? formatTime(session.last_accessed || session.updated_at || session.time?.updated) : '';
                
                // 只有当前正在工作的会话才实时更新预览
                let preview = session.last_message;
                
                // 只有当前选中的会话才从parts实时计算预览
                if (AppState.currentSession?.id === sessionId && AppState.parts[sessionId]) {
                    const parts = AppState.parts[sessionId];
                    const msgs = AppState.messages[sessionId] || [];
                    if (msgs.length > 0) {
                        const lastMsg = msgs[msgs.length - 1];
                        const msgParts = Object.values(parts).filter(p => p.messageID === lastMsg.id && p.type === 'text');
                        if (msgParts.length > 0) {
                            preview = msgParts.map(p => p.text || '').join('');
                            // 删除QQ用户前缀
                            preview = preview.replace(/^\[QQ用户[^}\]]*\}\s*/, '').substring(0, 30);
                        } else if (lastMsg.role === 'user') {
                            preview = '用户消息...';
                        } else if (AppState.isStreaming) {
                            preview = '思考中...';
                        }
                    }
                }
                // 删除QQ用户前缀
                if (preview) {
                    preview = preview.replace(/^\[QQ用户[^}\]]*\}\s*/, '').substring(0, 30);
                }
                if (!preview) preview = '暂无消息';
                
                item.innerHTML = `
                    <div class="session-header">
                        <span class="session-title">${escapeHtml(session.title || '新会话')}</span>
                        <span class="session-time">${time}</span>
                    </div>
                    <div class="session-preview">${escapeHtml(preview)}</div>
                    <button class="session-delete" title="删除会话" onclick="event.stopPropagation(); deleteSession('${sessionId}')">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                
                item.addEventListener('click', () => selectSession(sessionId));
                container.appendChild(item);
            });
        }

        async function createSession() {
            try {
                // 统一使用私有会话API
                const result = await apiPost('/api/session/new', { user_id: AppState.userQQ });
                if (result.success && result.session) {
                    const session = result.session;
                    session.session_id = session.session_id || session.id;
                    AppState.sessions.unshift(session);
                    renderSessions();
                    selectSession(session.session_id);
                } else {
                    throw new Error(result.error || '创建会话失败');
                }
            } catch (error) {
                console.error('创建会话失败:', error);
                alert('创建会话失败: ' + error.message);
            }
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个会话吗？')) return;
            
            try {
                // 统一使用私有会话API
                const result = await apiPost('/api/session/delete', { user_id: AppState.userQQ, session_id: sessionId });
                if (result.success) {
                    AppState.sessions = AppState.sessions.filter(s => (s.session_id || s.id) !== sessionId);
                } else {
                    throw new Error(result.error || '删除会话失败');
                }
                
                if (AppState.currentSession?.id === sessionId) {
                    AppState.currentSession = null;
                    document.getElementById('messageHeader').style.display = 'none';
                    document.getElementById('messageContent').innerHTML = `
                        <div class="empty-state" id="emptyState">
                            <i class="fas fa-comments"></i>
                            <p>选择一个会话开始聊天</p>
                            <p style="font-size: 12px; margin-top: 8px;">或点击「新建会话」开始新对话</p>
                        </div>
                    `;
                    document.getElementById('chatInput').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                }
                
                renderSessions();
            } catch (error) {
                console.error('删除会话失败:', error);
                alert('删除会话失败: ' + error.message);
            }
        }

        async function selectSession(sessionId) {
            if (!sessionId) {
                console.error('selectSession: sessionId is undefined');
                return;
            }
            
            // 更新选中状态
            AppState.currentSession = AppState.sessions.find(s => (s.session_id || s.id) === sessionId);
            if (AppState.currentSession) {
                AppState.currentSession.id = sessionId; // 确保id字段存在
            }
            
            // 保存当前会话ID到localStorage
            localStorage.setItem('currentSessionId', sessionId);
            
            // 更新 UI
            document.querySelectorAll('.session-item').forEach(item => {
                item.classList.toggle('active', item.dataset.sessionId === sessionId);
            });
            
            // 启用输入
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            // 加载消息
            await loadMessages(sessionId);
        }

        // =====================================================
        // 消息功能
        // =====================================================
        async function loadMessages(sessionId) {
            if (!sessionId) {
                console.error('loadMessages: sessionId is undefined');
                return;
            }
            
            try {
                // 只请求最近20条消息，减少网络开销
                const allMessages = await apiGet(`/api/opencode/sessions/${sessionId}/messages?limit=20`);
                
                const messages = allMessages || [];
                console.log(`[消息] 加载 ${messages.length} 条消息`);
                
                // 保存临时用户消息（如果有）
                const existingMessages = AppState.messages[sessionId] || [];
                const tempUserMsg = existingMessages.find(m => m.id.startsWith('temp_user_'));
                
                // 转换并存储到state
                AppState.messages[sessionId] = messages.map(msg => ({
                    id: msg.info?.id || msg.id,  // 优先从info获取ID
                    role: msg.info?.role || msg.role,
                    modelID: msg.info?.modelID,
                    agent: msg.info?.agent,
                    time: msg.info?.time || {created: msg.created_at}
                }));
                
                // 如果有临时用户消息且不在返回结果中，保留它
                if (tempUserMsg && !messages.find(m => (m.info?.id || m.id) === tempUserMsg.id)) {
                    AppState.messages[sessionId].push(tempUserMsg);
                }
                
                // 初始化parts - 按事件接收顺序存储
                if (!AppState.parts[sessionId]) AppState.parts[sessionId] = {};
                messages.forEach(msg => {
                    const msgID = msg.info?.id || msg.id;  // 优先从info获取ID
                    if (msg.parts) {
                        msg.parts.forEach(part => {
                            if (part.id) {
                                // 确保messageID被设置，不使用order字段
                                AppState.parts[sessionId][part.id] = {
                                    ...part,
                                    messageID: msgID
                                };
                            }
                        });
                    }
                });
                
                // 调试：检查parts分组
                const partsByMsg = {};
                Object.values(AppState.parts[sessionId]).forEach(p => {
                    const key = p.messageID?.substring(0,15) || 'undefined';
                    if (!partsByMsg[key]) partsByMsg[key] = [];
                    partsByMsg[key].push(p.type);
                });
                console.log('[消息] parts分组:', partsByMsg);
                
                renderMessages();
            } catch (error) {
                console.error('加载消息失败:', error);
            }
        }

        // 渲染节流 - 避免频繁重渲染
        const RENDER_THROTTLE = 50; // 50ms节流
        function scheduleRender() {
            const now = Date.now();
            const timeSinceLastRender = now - AppState.lastRenderTime;
            
            if (timeSinceLastRender >= RENDER_THROTTLE) {
                // 超过节流时间，直接渲染
                AppState.lastRenderTime = now;
                renderMessages();
            } else if (!AppState.renderPending) {
                // 在节流时间内，等待下一帧
                AppState.renderPending = true;
                requestAnimationFrame(() => {
                    AppState.renderPending = false;
                    AppState.lastRenderTime = Date.now();
                    renderMessages();
                });
            }
        }

        // 增量更新流式文本 - 只更新变化的part
        function updateStreamingText(sessionId, partID, text) {
            // 查找对应的DOM元素
            const container = document.getElementById('messageContent');
            const partEl = container.querySelector(`[data-part-id="${partID}"]`);
            
            if (partEl) {
                // 对于text类型，直接更新文本
                if (partEl.classList.contains('ai-text')) {
                    partEl.innerHTML = formatMarkdown(text);
                    // 滚动到底部
                    if (AppState.userAtBottom) {
                        container.scrollTop = container.scrollHeight;
                    }
                    return true;
                }
                // 对于thought类型，更新内部文本
                const thoughtText = partEl.querySelector('.thought-text');
                if (thoughtText) {
                    thoughtText.textContent = text;
                    if (AppState.userAtBottom) {
                        container.scrollTop = container.scrollHeight;
                    }
                    return true;
                }
            }
            return false; // 需要全量渲染
        }

        function renderMessages() {
            const container = document.getElementById('messageContent');
            const header = document.getElementById('messageHeader');
            const titleEl = document.getElementById('messageTitle');
            const subEl = document.getElementById('messageSub');
            const sessionId = AppState.currentSession?.id;
            
            if (!sessionId) {
                // 没有选中会话时，标题栏显示默认提示
                if (header) header.style.display = 'flex';
                if (titleEl) titleEl.textContent = '请选择会话';
                if (subEl) subEl.textContent = '';
                const tokenCountEl = document.getElementById('tokenCount');
                if (tokenCountEl) tokenCountEl.textContent = '0';
                container.innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-comments"></i>
                        <p>选择一个会话开始聊天</p>
                        <p style="font-size: 12px; margin-top: 8px;">或点击「新建会话」开始新对话</p>
                    </div>
                `;
                return;
            }
            
            // 更新标题栏
            if (header) header.style.display = 'flex';
            const session = AppState.sessions.find(s => s.id === sessionId || s.session_id === sessionId);
            if (titleEl) titleEl.textContent = session?.title || '新会话';
            const msgCount = (AppState.messages[sessionId] || []).length;
            if (subEl) subEl.textContent = `${msgCount} 条消息`;
            
            // 显示token数量（从session.tokens获取，由message.updated事件更新）
            const tokens = session?.tokens || {total: 0, input: 0, output: 0};
            const tokenCountEl = document.getElementById('tokenCount');
            if (tokenCountEl) tokenCountEl.textContent = (tokens.total || 0).toLocaleString();
            
            const messages = AppState.messages[sessionId] || [];
            const parts = AppState.parts[sessionId] || {};
            
            // 按messageID分组parts
            const partsByMessage = {};
            Object.values(parts).forEach(part => {
                if (part.messageID) {
                    if (!partsByMessage[part.messageID]) partsByMessage[part.messageID] = [];
                    partsByMessage[part.messageID].push(part);
                }
            });
            
            // 按时间排序消息
            messages.sort((a, b) => {
                const timeA = a.time?.created ? new Date(a.time.created).getTime() : 0;
                const timeB = b.time?.created ? new Date(b.time.created).getTime() : 0;
                return timeA - timeB;
            });
            
            container.innerHTML = '';
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comment-dots"></i>
                        <p>开始新的对话吧</p>
                    </div>
                `;
                return;
            }
            
            // 渲染每条消息 - 使用DocumentFragment优化性能
            const fragment = document.createDocumentFragment();
            messages.forEach(msg => {
                const msgParts = partsByMessage[msg.id] || [];
                const element = renderMessage(msg, msgParts);
                if (element) fragment.appendChild(element);
            });
            container.appendChild(fragment);
            
            // 检查是否需要显示"思考中..."
            // 条件：正在流式接收 且 (最后一条是用户消息 或 最后一条AI消息没有实际内容)
            console.log('[思考中检查] isStreaming:', AppState.isStreaming, 'messages:', messages.length);
            if (AppState.isStreaming && messages.length > 0) {
                const lastMsg = messages[messages.length - 1];
                const lastMsgRole = lastMsg.role || lastMsg.info?.role;
                console.log('[思考中检查] lastMsgRole:', lastMsgRole);
                
                let showThinking = false;
                if (lastMsgRole === 'user') {
                    // 最后一条是用户消息，显示思考中
                    showThinking = true;
                } else if (lastMsgRole === 'assistant') {
                    // 最后一条是AI消息，检查是否有实际内容
                    const lastMsgParts = partsByMessage[lastMsg.id] || [];
                    const hasContent = lastMsgParts.some(p => p.text && p.text.trim());
                    if (!hasContent) {
                        showThinking = true;
                    }
                }
                
                console.log('[思考中检查] showThinking:', showThinking);
                if (showThinking) {
                    const thinkingEl = document.createElement('div');
                    thinkingEl.className = 'msg-ai-wrap thinking-placeholder';
                    thinkingEl.id = 'thinking-placeholder';
                    thinkingEl.innerHTML = `
                        ${getAIAvatarHTML()}
                        <div class="ai-content">
                            <div class="ai-thinking">
                                <span class="thinking-dots">
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                    <span class="dot"></span>
                                </span>
                                <span class="thinking-text">思考中</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(thinkingEl);
                }
            }
            
            // 只有用户在底部时才自动滚动
            if (AppState.userAtBottom) {
                container.style.scrollBehavior = 'auto';
                container.scrollTop = container.scrollHeight;
                container.style.scrollBehavior = 'smooth';
            }
            
            // 更新会话列表预览
            renderSessions();
        }

        function renderMessage(msg, parts = []) {
            // OpenCode 返回格式: {info: {role, ...}, parts: [...]}
            const role = msg.role || msg.info?.role;
            if (role === 'user') {
                return renderUserMessage(msg);
            } else if (role === 'assistant') {
                return renderAIMessage(msg, parts);
            }
            return null;
        }

        function renderUserMessage(msg) {
            const wrap = document.createElement('div');
            wrap.className = 'msg-user-wrap';
            wrap.dataset.messageId = msg.id;
            
            // 从state获取内容 - parts可能在msg.parts或需要从AppState.parts获取
            let content = '';
            const sessionId = AppState.currentSession?.id;
            
            // 调试：检查msg.parts和AppState.parts
            console.log('[renderUser] msg.id:', msg.id?.substring(0,20), 'msg.parts:', msg.parts?.length, 'hasInfoParts:', !!msg.info?.parts);
            
            // 优先从AppState.parts获取，避免重复
            if (sessionId && AppState.parts[sessionId]) {
                const msgParts = Object.values(AppState.parts[sessionId])
                    .filter(p => p.messageID === msg.id);
                content = msgParts.map(p => p.text || '').join('');
                console.log('[renderUser] 从AppState.parts获取, parts数量:', msgParts.length);
            }
            // 只有当AppState.parts中没有内容时，才从msg.parts获取
            if (!content && msg.parts && Array.isArray(msg.parts)) {
                content = msg.parts.map(p => p.text || '').join('');
                console.log('[renderUser] 从msg.parts获取');
            }
            if (!content) content = msg.content || '';
            
            // 删除前缀（网页不显示前缀）
            // 前缀格式: [QQ用户 "xxx" 发送了一个消息，请私聊回复, qq用户名称: "xxx" , 会话ID: "xxx"]
            // 使用更宽松的正则，匹配任意空白和逗号
            const prefixPattern = /^\[QQ用户\s*"[^"]*"\s*发送了一个消息[，,]\s*请私聊回复[，,]\s*qq用户名称:\s*"[^"]*"\s*[，,]\s*会话ID:\s*"[^"]*"\]\s*/;
            const originalContent = content;
            content = content.replace(prefixPattern, '');
            
            // 删除 <ultrawork-mode> 标签及其内容
            content = content.replace(/<ultrawork-mode>[\s\S]*?<\/ultrawork-mode>/gi, '');
            
            if (originalContent !== content) {
                console.log('[renderUser] 删除前缀/标签成功, 原长度:', originalContent.length, '新长度:', content.length);
            }
            
            // 从state获取元数据
            const modelInfo = msg.modelID || AppState.selectedModel || '';
            const agentInfo = msg.agent || AppState.selectedAgent || '';
            const time = msg.time?.created ? formatTime(new Date(msg.time.created).toISOString()) : '';
            
            wrap.innerHTML = `
                <div class="msg-user-bubble">${escapeHtml(content)}</div>
                <div class="msg-user-info">${modelInfo} | ${agentInfo} | ${time}</div>
            `;
            
            return wrap;
        }

        function renderAIMessage(msg, parts = []) {
            const wrap = document.createElement('div');
            wrap.className = 'msg-ai-wrap';
            wrap.dataset.messageId = msg.id;
            
            wrap.innerHTML = `
                ${getAIAvatarHTML()}
                <div class="ai-content"></div>
            `;
            
            const contentEl = wrap.querySelector('.ai-content');
            
            // 调试日志
            console.log(`[renderAI] msg=${msg.id?.substring(0,15)} parts=${parts.length} types=${parts.map(p=>p.type).join(',')}`);
            
            // 如果没有传入parts，尝试从msg或state获取
            if (parts.length === 0 && msg.parts && Array.isArray(msg.parts)) {
                parts = msg.parts;
                console.log(`[renderAI] 从msg.parts获取: ${parts.length}`);
            }
            
            // 不排序，直接按照事件接收顺序渲染（现代JS引擎会按插入顺序遍历对象属性）
            const sortedParts = parts;
            
            if (sortedParts.length > 0) {
                sortedParts.forEach(part => {
                    const el = renderMessagePart(part);
                    if (el) contentEl.appendChild(el);
                });
            } else if (msg.content) {
                // 简单文本内容
                const textEl = document.createElement('div');
                textEl.className = 'ai-text';
                textEl.innerHTML = formatMarkdown(msg.content);
                contentEl.appendChild(textEl);
            } else {
                // 没有实际内容，返回null让renderMessages显示"思考中"提示
                console.log(`[renderAI] 无内容，跳过: msg=${msg.id?.substring(0,15)}`);
                return null;
            }
            
            return wrap;
        }

        function renderMessagePart(part) {
            switch (part.type) {
                case 'text':
                    const textEl = document.createElement('div');
                    textEl.className = 'ai-text';
                    if (part.id) textEl.dataset.partId = part.id;
                    textEl.innerHTML = formatMarkdown(part.text);
                    return textEl;
                    
                case 'reasoning':
                case 'thought':
                    const thoughtEl = document.createElement('div');
                    thoughtEl.className = 'thought-block';
                    if (part.id) thoughtEl.dataset.partId = part.id;
                    // 添加内部文本元素便于增量更新
                    const thoughtText = document.createElement('div');
                    thoughtText.className = 'thought-text';
                    thoughtText.textContent = part.text || part.content || '';
                    thoughtEl.appendChild(thoughtText);
                    return thoughtEl;
                    
                case 'tool':
                    // OpenCode 工具调用格式
                    return renderToolPart(part);
                    
                case 'tool_call':
                    return renderToolCard(part);
                    
                case 'tool_result':
                    return renderToolResult(part);
                    
                default:
                    return null;
            }
        }

        function renderToolPart(part) {
            // OpenCode 工具调用格式: {type: 'tool', tool: 'bash', state: {status, input, output}}
            const card = document.createElement('div');
            card.className = 'tool-card';
            
            const toolName = part.tool || 'tool';
            const state = part.state || {};
            const status = state.status || 'pending';
            const input = state.input || {};
            const output = state.output || '';
            
            // 根据工具类型渲染不同样式
            if (toolName === 'read') {
                // read工具：标题显示行号范围
                const filePath = input.filePath || input.file_path || input.path || '';
                const offset = input.offset || 1;
                const limit = input.limit || 2000;
                const content = output || '';
                const endLine = offset + Math.min(limit, 2000) - 1;
                const displayPath = filePath.length > 40 ? '...' + filePath.slice(-37) : filePath;
                
                card.innerHTML = `
                    <div class="tool-header" onclick="toggleTool(this)" title="${escapeHtml(filePath)}">
                        <div><i class="fas fa-file-code tool-icon"></i>read · ${escapeHtml(displayPath)} · 行${offset}-${endLine}</div>
                        <i class="fas fa-chevron-down tool-toggle-icon"></i>
                    </div>
                    <div class="tool-body">
                        <p style="color: #666; font-size: 12px; margin-bottom: 8px; word-break: break-all;">文件: ${escapeHtml(filePath)}</p>
                        <div class="diff-container" style="padding: 10px; white-space: pre-wrap; word-break: break-word;">${escapeHtml(String(content).substring(0, 3000))}${String(content).length > 3000 ? '\n...(内容过长已截断)' : ''}</div>
                    </div>
                `;
            } else if (toolName === 'edit') {
                // edit工具：默认展开，显示diff
                card.classList.add('expanded');
                const filePath = input.filePath || input.file_path || input.path || '';
                const oldString = input.oldString || input.old_string || '';
                const newString = input.newString || input.new_string || '';
                const displayPath = filePath.length > 40 ? '...' + filePath.slice(-37) : filePath;
                
                // 生成合并diff显示 - 类似git diff
                let diffHtml = '';
                const oldLines = oldString.split('\n');
                const newLines = newString.split('\n');
                
                // 简单的LCS diff算法
                function computeDiff(oldArr, newArr) {
                    const result = [];
                    let oldIdx = 0;
                    let newIdx = 0;
                    
                    // 构建LCS矩阵
                    const lcs = [];
                    for (let i = 0; i <= oldArr.length; i++) {
                        lcs[i] = [];
                        for (let j = 0; j <= newArr.length; j++) {
                            if (i === 0 || j === 0) {
                                lcs[i][j] = 0;
                            } else if (oldArr[i - 1] === newArr[j - 1]) {
                                lcs[i][j] = lcs[i - 1][j - 1] + 1;
                            } else {
                                lcs[i][j] = Math.max(lcs[i - 1][j], lcs[i][j - 1]);
                            }
                        }
                    }
                    
                    // 回溯生成diff
                    let i = oldArr.length;
                    let j = newArr.length;
                    const diff = [];
                    
                    while (i > 0 || j > 0) {
                        if (i > 0 && j > 0 && oldArr[i - 1] === newArr[j - 1]) {
                            diff.unshift({ type: 'equal', oldLine: i, newLine: j, text: oldArr[i - 1] });
                            i--;
                            j--;
                        } else if (j > 0 && (i === 0 || lcs[i][j - 1] >= lcs[i - 1][j])) {
                            diff.unshift({ type: 'add', newLine: j, text: newArr[j - 1] });
                            j--;
                        } else if (i > 0) {
                            diff.unshift({ type: 'del', oldLine: i, text: oldArr[i - 1] });
                            i--;
                        }
                    }
                    
                    return diff;
                }
                
                const diffResult = computeDiff(oldLines, newLines);
                
                // 统计变更
                let delCount = 0;
                let addCount = 0;
                diffResult.forEach(item => {
                    if (item.type === 'del') delCount++;
                    if (item.type === 'add') addCount++;
                });
                
                // 渲染diff
                diffHtml += `<div style="color:#666;font-size:11px;margin-bottom:8px;">`;
                if (delCount > 0) diffHtml += `<span style="color:#dc3545;">-${delCount}</span> `;
                if (addCount > 0) diffHtml += `<span style="color:#28a745;">+${addCount}</span>`;
                diffHtml += `</div>`;
                
                diffResult.forEach(item => {
                    if (item.type === 'equal') {
                        // 未改变的行：白色/灰色
                        diffHtml += `<div class="diff-line" style="background:#fff;"><div class="diff-num" style="color:#999;">${item.oldLine}</div><div class="diff-code" style="color:#666;"> ${escapeHtml(item.text)}</div></div>`;
                    } else if (item.type === 'del') {
                        // 删除的行：红色
                        diffHtml += `<div class="diff-line diff-del"><div class="diff-num">${item.oldLine}</div><div class="diff-code">-${escapeHtml(item.text)}</div></div>`;
                    } else if (item.type === 'add') {
                        // 新增的行：绿色
                        diffHtml += `<div class="diff-line diff-add"><div class="diff-num">${item.newLine}</div><div class="diff-code">+${escapeHtml(item.text)}</div></div>`;
                    }
                });
                
                card.innerHTML = `
                    <div class="tool-header" onclick="toggleTool(this)" title="${escapeHtml(filePath)}">
                        <div><i class="fas fa-edit tool-icon" style="color:#f6c23e;"></i>edit · ${escapeHtml(displayPath)}</div>
                        <i class="fas fa-chevron-down tool-toggle-icon"></i>
                    </div>
                    <div class="tool-body">
                        <p style="color: #666; font-size: 12px; margin-bottom: 8px; word-break: break-all;">文件: ${escapeHtml(filePath)}</p>
                        <div class="diff-container">${diffHtml || '<div style="padding:10px;color:#666;">无变更内容</div>'}</div>
                    </div>
                `;
            } else if (toolName === 'bash') {
                // bash工具：标题显示描述内容
                card.classList.add('expanded');
                const command = input.command || input.cmd || '';
                const description = input.description || '';
                const exitCode = state.exitCode !== undefined ? state.exitCode : (output.includes('Exit Code:') ? output.match(/Exit Code:\s*(\d+)/)?.[1] : '0');
                const is_success = exitCode === 0 || exitCode === '0';
                
                // 标题优先显示description，没有则显示命令
                const displayTitle = description || command;
                const shortTitle = displayTitle.length > 50 ? displayTitle.substring(0, 47) + '...' : displayTitle;
                
                card.innerHTML = `
                    <div class="tool-header" onclick="toggleTool(this)" title="${escapeHtml(displayTitle)}">
                        <div><i class="fas fa-terminal tool-icon" style="color:#333;"></i>bash · ${escapeHtml(shortTitle)}</div>
                        <i class="fas fa-chevron-down tool-toggle-icon"></i>
                    </div>
                    <div class="tool-body">
                        <div class="bash-cmd">$ ${escapeHtml(command)}
${escapeHtml(String(output).replace(/Exit Code:\s*\d+.*$/s, '').trim().substring(0, 2000))}${String(output).length > 2000 ? '\n...(输出过长已截断)' : ''}</div>
                        <div class="bash-status" style="color: ${is_success ? '#28a745' : '#dc3545'};">
                            <i class="fas ${is_success ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                            Exit Code: ${exitCode} ${is_success ? '(Success)' : '(Failed)'}
                        </div>
                    </div>
                `;
            } else if (toolName === 'write' || toolName === 'write_file') {
                // write工具
                const filePath = input.filePath || input.file_path || input.path || '';
                const content = input.content || '';
                const displayPath = filePath.length > 50 ? '...' + filePath.slice(-47) : filePath;
                
                card.innerHTML = `
                    <div class="tool-header" onclick="toggleTool(this)" title="${escapeHtml(filePath)}">
                        <div><i class="fas fa-file-write tool-icon" style="color:#17a2b8;"></i>write · ${escapeHtml(displayPath)}</div>
                        <i class="fas fa-chevron-down tool-toggle-icon"></i>
                    </div>
                    <div class="tool-body">
                        <p style="color: #666; font-size: 12px; margin-bottom: 8px; word-break: break-all;">文件: ${escapeHtml(filePath)}</p>
                        <p style="color: #666; font-size: 12px; margin-bottom: 8px;">写入 ${content.length} 字符</p>
                        <div class="diff-container" style="padding: 10px; white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto;">${escapeHtml(content.substring(0, 1000))}${content.length > 1000 ? '\n...(内容过长已截断)' : ''}</div>
                    </div>
                `;
            } else if (toolName.startsWith('qq_') || toolName.includes('skill_mcp')) {
                // QQ工具或MCP工具调用
                const isQQTool = toolName.startsWith('qq_');
                let mcpName = '';
                let toolInput = '';
                let args = {};
                
                if (toolName.includes('skill_mcp')) {
                    mcpName = input.mcp_name || '';
                    toolInput = input.tool_name || '';
                    args = input.arguments || {};
                } else {
                    // 插件集成的QQ工具
                    args = input;
                }
                
                // 检测是否是QQ相关工具
                const isQQMcp = mcpName === 'qq-mcp' || mcpName.includes('qq');
                const isQQRelated = isQQTool || isQQMcp;
                
                if (isQQRelated) {
                    // QQ工具：特殊样式
                    card.classList.add('qq-card', 'expanded');
                    
                    // 获取工具的友好名称
                    const qqToolNames = {
                        'qq_send_message': '发送消息',
                        'qq_get_friends': '获取好友列表',
                        'qq_search_friend': '搜索好友',
                        'qq_send_file': '发送文件',
                        'qq_get_file': '获取文件',
                        'qq_get_login_info': '获取登录信息',
                        'qq_send_poke': '发送戳一戳',
                        'qq_get_group_history': '获取群历史'
                    };
                    
                    const toolDisplayName = qqToolNames[toolName] || toolName;
                    
                    // 判断是私聊还是群聊
                    let chatType = '';
                    let chatTarget = '';
                    if (args.messageType === 'private') {
                        chatType = '私聊';
                        chatTarget = args.targetId || '';
                    } else if (args.messageType === 'group') {
                        chatType = '群聊';
                        chatTarget = args.targetId || '';
                    }
                    
                    // 获取消息内容
                    const message = args.message || '';
                    const groupId = args.groupId || '';
                    const userId = args.userId || '';
                    
                    // 构建标题
                    let title = toolDisplayName;
                    if (chatType && chatTarget) {
                        title = `${toolDisplayName} - ${chatType} ${chatTarget}`;
                    } else if (groupId) {
                        title = `${toolDisplayName} - 群${groupId}`;
                    } else if (userId) {
                        title = `${toolDisplayName} - 用户${userId}`;
                    }
                    
                    card.innerHTML = `
                        <div class="tool-header" onclick="toggleTool(this)">
                            <div><i class="fab fa-qq qq-icon tool-icon"></i>${escapeHtml(title)}</div>
                            <i class="fas fa-chevron-down tool-toggle-icon"></i>
                        </div>
                        <div class="tool-body">
                            ${message ? `<div style="background: #f8fbff; padding: 10px; border-radius: 6px; border: 1px solid #e1e8f0; font-size: 13px; margin-bottom: 8px;">${escapeHtml(message.substring(0, 500))}${message.length > 500 ? '...' : ''}</div>` : ''}
                            ${output ? `<p style="font-size: 12px; color: #28a745;"><i class="fas fa-check-circle"></i> 执行成功</p>` : ''}
                            ${output ? `<details style="margin-top: 8px;"><summary style="cursor: pointer; font-size: 12px; color: #666;">查看详细结果</summary><pre style="margin: 8px 0 0 0; white-space: pre-wrap; font-size: 11px; color: #666; background: #f8fafc; padding: 8px; border-radius: 6px; max-height: 200px; overflow-y: auto;">${escapeHtml(String(output).substring(0, 2000))}${String(output).length > 2000 ? '\n...' : ''}</pre></details>` : ''}
                        </div>
                    `;
                } else {
                    // 其他MCP工具：默认折叠，标题显示name
                    const displayArgs = args.params || args;
                    
                    // 从arguments中提取name字段
                    const toolName2 = displayArgs.name || toolInput || 'MCP工具';
                    
                    // 状态图标
                    let statusIcon = 'fa-spinner fa-spin';
                    let statusColor = '#f6c23e';
                    if (status === 'completed') {
                        statusIcon = 'fa-check-circle';
                        statusColor = '#28a745';
                    } else if (status === 'error' || status === 'failed') {
                        statusIcon = 'fa-times-circle';
                        statusColor = '#dc3545';
                    }
                    
                    card.innerHTML = `
                        <div class="tool-header" onclick="toggleTool(this)">
                            <div><i class="fas fa-plug tool-icon" style="color:#6366f1;"></i>skill · name: "${escapeHtml(toolName2)}" <i class="fas ${statusIcon}" style="color:${statusColor};font-size:12px;margin-left:8px;"></i></div>
                            <i class="fas fa-chevron-down tool-toggle-icon"></i>
                        </div>
                        <div class="tool-body">
                            ${Object.keys(displayArgs).length > 0 ? `<div style="margin-bottom:8px;font-size:12px;color:#666;"><strong>参数:</strong></div><pre style="margin:0;white-space:pre-wrap;font-size:12px;color:#666;background:#f8fafc;padding:8px;border-radius:6px;max-height:150px;overflow-y:auto;">${escapeHtml(JSON.stringify(displayArgs, null, 2))}</pre>` : ''}
                            ${output ? `<div style="margin-top:8px;font-size:12px;color:#666;"><strong>结果:</strong></div><div class="bash-cmd" style="margin-top:4px;max-height:200px;overflow-y:auto;">${escapeHtml(String(output).substring(0, 2000))}${String(output).length > 2000 ? '...' : ''}</div>` : ''}
                        </div>
                    `;
                }
            } else if (toolName === 'grep' || toolName.includes('grep')) {
                // grep工具：标题显示搜索的文件和关键词，默认折叠
                const pattern = input.pattern || input.query || input.keyword || '';
                const path = input.path || input.filePath || input.file_path || '';
                const displayPath = path.length > 30 ? '...' + path.slice(-27) : path;
